name: CI/CD - Test & Deploy 🚀

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: 🧪 Test & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx
      
      - name: 🔐 Setup environment variables
        run: |
          # Solo las que REALMENTE usas
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
          echo "HF_TOKEN=${{ secrets.HF_TOKEN }}" >> .env
          # Gemini: dummy para que no falle (no se usa realmente)
          echo "GEMINI_API_KEY=dummy_not_used" >> .env
          # Configuración de entorno
          echo "ENVIRONMENT=testing" >> .env
          echo "DEBUG=False" >> .env
          echo "LOG_LEVEL=ERROR" >> .env
      
      - name: 🔍 Verify critical files
        run: |
          echo "Verificando archivos críticos..."
          files=(
            "data/vector_store/faiss_index.bin"
            "data/vector_store/intents.json"
            "data/intents.json"
            "data/menu.json"
            "static/index.html"
          )
          for f in "${files[@]}"; do
            [ -f "$f" ] && echo "✅ $f" || echo "⚠️ $f no existe"
          done
      
      - name: 🧪 Test Groq connection (REAL)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python -c "
          import os
          from groq import Groq
          
          client = Groq(api_key=os.environ['GROQ_API_KEY'])
          response = client.chat.completions.create(
              messages=[{'role': 'user', 'content': 'Responde OK'}],
              model='llama-3.3-70b-versatile',
              max_tokens=5
          )
          assert 'OK' in response.choices[0].message.content.upper()
          print('✅ Groq funciona correctamente')
          "
      
      - name: 🧪 Test API import
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from api.main import app
          assert app is not None
          print('✅ API importada correctamente')
          "
      
      - name: 🧪 Test GroqWrapper
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from models.groq_wrapper import GroqWrapper
          
          wrapper = GroqWrapper()
          response = wrapper.generate('Responde OK')
          assert 'OK' in response.upper()
          print(f'✅ GroqWrapper OK: {response[:50]}')
          "
      
      - name: 🧪 Test RAG system
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python -c "
          import sys
          sys.path.insert(0, '.')
          from rag.core import RAGSystem
          
          rag = RAGSystem()
          assert rag is not None
          print('✅ RAGSystem inicializado correctamente')
          "

  deploy:
    name: 🚀 Deploy to Hugging Face
    needs: test
    if: success() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      
      - name: 🚀 Push to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git push --force https://user:${HF_TOKEN}@huggingface.co/spaces/ecotecds/Chatbot-RAG-v4 main