# ============================================================
# 📡 MONITOREO CONTINUO DEL CHATBOT EN PRODUCCIÓN
# ============================================================
# Esta versión NO CONSUME TOKENS de Groq.
# Solo verifica que el servicio esté vivo y respondiendo.
#
# Estrategia de monitoreo:
# 1. Health Check (/health) - 0 tokens
# 2. Verificar que el servidor responda - 0 tokens
# 3. Verificar que el endpoint /chat existe - 0 tokens
# ============================================================

name: 📡 Monitoreo Continuo del Chatbot

# ============================================================
# 📅 CUANDO SE EJECUTA
# ============================================================
on:
  # ⏰ Programado: Cada 10 minutos (para ahorrar recursos)
  schedule:
    - cron: '*/10 * * * *'  # Cada 10 minutos
    
  # 🔧 Manual: Permite ejecutar desde la interfaz de GitHub
  workflow_dispatch:

# ============================================================
# 🧪 TRABAJO: HEALTH CHECK SIN TOKENS
# ============================================================
jobs:
  health-check:
    name: 🔍 Verificar Estado del Servicio (Sin Tokens)
    runs-on: ubuntu-latest
    timeout-minutes: 3  # Máximo 3 minutos
    
    steps:
      # --------------------------------------------------------
      # PASO 1: Verificar que el servidor RESPONDA (Ping)
      # --------------------------------------------------------
      - name: 🔍 Ping al Servidor (Verificar que está vivo)
        id: ping
        run: |
          echo "🔍 Verificando que el servidor esté vivo..."
          echo "🌐 URL: https://ecotecds-Chatbot-RAG-v4.hf.space"
          
          # Verificar que el servidor responda (solo cabeceras)
          # HEAD request es más ligero que GET
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --head \
            --max-time 10 \
            https://ecotecds-Chatbot-RAG-v4.hf.space || echo "000")
          
          echo "ping_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "302" ] || [ "$HTTP_CODE" = "301" ]; then
            echo "✅ Servidor responde (HTTP $HTTP_CODE)"
          else
            echo "❌ Servidor NO responde (HTTP $HTTP_CODE)"
          fi
      
      # --------------------------------------------------------
      # PASO 2: Verificar Health Check (/health) - 0 tokens
      # --------------------------------------------------------
      - name: 💚 Health Check - Endpoint /health
        id: health
        run: |
          echo "💚 Verificando health check del chatbot..."
          echo "🌐 URL: https://ecotecds-Chatbot-RAG-v4.hf.space/health"
          
          # Health check NO consume tokens de Groq
          # Es solo un endpoint interno que devuelve el estado
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            https://ecotecds-Chatbot-RAG-v4.hf.space/health || echo "000")
          
          echo "health_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Health Check: OK (HTTP 200) - SIN CONSUMO DE TOKENS"
            
            # Opcional: Verificar que la respuesta sea JSON válido
            RESPONSE=$(curl -s --max-time 15 \
              https://ecotecds-Chatbot-RAG-v4.hf.space/health)
            
            if echo "$RESPONSE" | grep -q '"status"'; then
              echo "✅ Health Check: Respuesta JSON válida"
              echo "📝 Estado: $(echo $RESPONSE | grep -o '"status":"[^"]*"' | cut -d'"' -f4)"
            fi
          else
            echo "❌ Health Check: FALLÓ (HTTP $HTTP_CODE)"
          fi
      
      # --------------------------------------------------------
      # PASO 3: Verificar que el endpoint /chat EXISTE (sin llamarlo)
      # --------------------------------------------------------
      - name: 🔍 Verificar existencia del endpoint /chat
        id: chat_endpoint
        run: |
          echo "🔍 Verificando que el endpoint /chat existe..."
          echo "🌐 URL: https://ecotecds-Chatbot-RAG-v4.hf.space/chat"
          
          # Usamos OPTIONS o HEAD para verificar que el endpoint existe
          # SIN hacer una llamada real que consuma tokens
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            --head \
            --max-time 10 \
            https://ecotecds-Chatbot-RAG-v4.hf.space/chat || echo "000")
          
          echo "chat_endpoint_code=$HTTP_CODE" >> $GITHUB_OUTPUT
          
          # 404 = No existe, 405 = Método no permitido pero existe, 200 = OK
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "405" ] || [ "$HTTP_CODE" = "302" ]; then
            echo "✅ Endpoint /chat existe (HTTP $HTTP_CODE) - SIN CONSUMO DE TOKENS"
          else
            echo "⚠️ Endpoint /chat no disponible (HTTP $HTTP_CODE)"
          fi
      
      # --------------------------------------------------------
      # PASO 4: Enviar ALERTA DE CAÍDA (solo si falló algo)
      # --------------------------------------------------------
      - name: 📱 Enviar Alerta de Caída
        if: |
          steps.ping.outputs.ping_code != '200' ||
          steps.health.outputs.health_code != '200' ||
          steps.chat_endpoint.outputs.chat_endpoint_code == '404'
        run: |
          echo "🚨 ¡ALERTA! El chatbot no está respondiendo correctamente"
          
          # Obtener estados para el mensaje
          PING_CODE="${{ steps.ping.outputs.ping_code }}"
          HEALTH_CODE="${{ steps.health.outputs.health_code }}"
          CHAT_CODE="${{ steps.chat_endpoint.outputs.chat_endpoint_code }}"
          
          # Construir el mensaje de alerta
          MESSAGE="🚨 *ALERTA: CHATBOT CAÍDO O DEGRADADO*

          El sistema no está respondiendo correctamente en producción.

          📊 *Estado de los servicios (SIN consumo de tokens):*
          • Ping al Servidor: $([ "$PING_CODE" = "200" ] && echo "✅ OK" || echo "❌ Falló (HTTP $PING_CODE)")
          • Health Check: $([ "$HEALTH_CODE" = "200" ] && echo "✅ OK" || echo "❌ Falló (HTTP $HEALTH_CODE)")
          • Endpoint /chat: $([ "$CHAT_CODE" = "200" ] || [ "$CHAT_CODE" = "405" ] && echo "✅ OK" || echo "❌ Falló (HTTP $CHAT_CODE)")

          📅 Fecha: $(date '+%d/%m/%Y %H:%M:%S')
          🌐 URL: https://ecotecds-Chatbot-RAG-v4.hf.space
          💰 Tokens consumidos en monitoreo: 0

          🔧 *Acción Requerida:* 
          1. Revisar logs en Hugging Face Spaces
          2. Verificar el estado del servicio
          3. Reiniciar si es necesario"
          
          echo "📨 Enviando alerta a Telegram..."
          
          # Enviar a Telegram
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MESSAGE" \
            -d "parse_mode=Markdown"
          
          echo "✅ Alerta enviada a Telegram"
      
      # --------------------------------------------------------
      # PASO 5: Enviar ALERTA DE RECUPERACIÓN
      # --------------------------------------------------------
      - name: 📱 Enviar Alerta de Recuperación
        if: |
          (steps.ping.outputs.ping_code == '200' &&
           steps.health.outputs.health_code == '200' &&
           (steps.chat_endpoint.outputs.chat_endpoint_code == '200' ||
            steps.chat_endpoint.outputs.chat_endpoint_code == '405')) &&
          (github.event_name == 'workflow_dispatch')
        run: |
          echo "✅ El servicio está funcionando correctamente"
          
          MESSAGE="✅ *RECUPERACIÓN: Chatbot Operativo*

          El servicio ha vuelto a funcionar correctamente en producción.

          📊 *Estado actual:*
          • Ping al Servidor: ✅ OK
          • Health Check: ✅ OK
          • Endpoint /chat: ✅ OK

          📅 Fecha: $(date '+%d/%m/%Y %H:%M:%S')
          🌐 URL: https://ecotecds-Chatbot-RAG-v4.hf.space
          💰 Tokens consumidos en monitoreo: 0

          ✅ Todos los endpoints responden correctamente.
          El sistema está listo para recibir consultas."
          
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MESSAGE" \
            -d "parse_mode=Markdown"
      
      # --------------------------------------------------------
      # PASO 6: Resumen de la ejecución
      # --------------------------------------------------------
      - name: 📊 Resumen de Ejecución
        if: always()
        run: |
          echo "=========================================="
          echo "📊 RESUMEN DE MONITOREO (0 TOKENS GASTADOS)"
          echo "=========================================="
          echo "🕐 Fecha: $(date '+%d/%m/%Y %H:%M:%S')"
          echo "📋 Ping: ${{ steps.ping.outputs.ping_code }}"
          echo "💚 Health Check: ${{ steps.health.outputs.health_code }}"
          echo "🔗 Endpoint /chat: ${{ steps.chat_endpoint.outputs.chat_endpoint_code }}"
          echo "=========================================="
          echo "💰 Tokens consumidos en monitoreo: 0"
          
          if [ "${{ steps.health.outputs.health_code }}" = "200" ]; then
            echo "✅ SERVICIO SALUDABLE"
          else
            echo "❌ SERVICIO CON PROBLEMAS - Alerta enviada"
          fi
          echo "=========================================="